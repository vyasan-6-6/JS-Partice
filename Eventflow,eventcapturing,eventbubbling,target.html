<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <div id="divbox" style="padding: 20; border: 8 solid red">
            DIV
            <p id="pbox" style="padding: 20; border: 8 solid green">
                P
                <button id="btn">Click Me</button>
            </p>
        </div>

        <script>
            document.getElementById("divbox").addEventListener(
                "click",
                () => {
                    alert("DIV Clicked");
                },
                true
            );
            document.getElementById("pbox").addEventListener(
                "click",
                () => {
                    alert("P Clicked");
                },
                true
            );
            document.getElementById("btn").addEventListener(
                "click",
                () => {
                    alert("Button Clicked");
                },
                false
            );
        </script>
        <ul id="myList" style="border: 2px solid red; padding: 20px">
            <li id="item1">Item 1</li>
            <li id="item2">Item 2</li>
            <li id="item3">Item 3</li>
        </ul>

        <script>
            // Capturing on UL
            document.getElementById("myList").addEventListener(
                "click",
                () => {
                    console.log("UL capturing");
                },
                true
            );

            // Bubbling on UL
            document.getElementById("myList").addEventListener(
                "click",
                () => {
                    console.log("UL bubbling");
                },
                false
            );

            // Listener on LI
            document.getElementById("item2").addEventListener("click", () => {
                console.log("LI clicked");
            });
        </script>
    </body>
</html>
