<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main class="bg-gray-50">

  <section class="relative h-[600px] bg-cover bg-center flex items-center" style="background-image: url('summer-banner.jpg');">
    <div class="bg-black/30 absolute inset-0"></div> <div class="container mx-auto px-6 relative text-white">
      <h1 class="text-6xl font-bold">Summer is Here.</h1>
      <p class="text-xl mt-4">Refresh your routine with our seasonal picks.</p>
      <button class="mt-6 bg-orange-500 hover:bg-orange-600 px-8 py-3 rounded-full font-bold">Shop the Sale</button>
    </div>
  </section>

  <section class="py-12 container mx-auto text-center">
    <h2 class="text-2xl font-bold mb-8">Shop by Category</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="p-6 bg-white rounded-xl shadow-sm hover:shadow-md cursor-pointer">🕶️ Sunglasses</div>
      <div class="p-6 bg-white rounded-xl shadow-sm hover:shadow-md cursor-pointer">🧴 Skincare</div>
      <div class="p-6 bg-white rounded-xl shadow-sm hover:shadow-md cursor-pointer">👜 Bags</div>
      <div class="p-6 bg-white rounded-xl shadow-sm hover:shadow-md cursor-pointer">⌚ Tech</div>
    </div>
  </section>

  <section class="py-12 bg-white">
    <div class="container mx-auto px-6">
      <h2 class="text-2xl font-bold mb-8">Featured Products</h2>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="group border p-4 rounded-lg">
          <div class="h-64 bg-gray-100 mb-4 rounded overflow-hidden">
            <img src="prod.jpg" class="group-hover:scale-105 transition duration-300">
          </div>
          <h3 class="font-semibold">Organic Sunscreen</h3>
          <p class="text-gray-500">$24.00</p>
          <button class="w-full mt-4 border border-black py-2 hover:bg-black hover:text-white transition">Add to Cart</button>
        </div>
      </div>
    </div>
  </section>

  <section class="bg-yellow-400 py-6 text-center font-bold">
    🎁 Use code <span class="bg-white px-2 py-1 rounded">FREESHIP</span> for free shipping on orders over $50!
  </section>

</main>
 
</body>
</html>
